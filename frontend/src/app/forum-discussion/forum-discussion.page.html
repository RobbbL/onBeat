<ion-content [fullscreen]="true">
  <app-title-space title="Discussione: Era {{category.toUpperCase()}}">
    <button class="back-btn" routerLink="/forum">← Torna alla lista</button>
  </app-title-space>

  <div class="forum-detail-container">
    
    <div class="forum-sidebar">
      <div class="create-post-box">
        <h3>Partecipa alla discussione</h3>
        <textarea 
          [(ngModel)]="newPostText"
          maxlength="1024" 
          placeholder="Scrivi qualcosa che lasci il segno..." 
          rows="4">
        </textarea>
        <p class="char-counter">
          Caratteri: {{ newPostText.length }}/1024
        </p>
        <button class="send-post-btn" (click)="submitPost()">Pubblica Post</button>
      </div>

      <div class="search-container">
        <input 
          type="text" 
          [(ngModel)]="searchString" 
          placeholder="Cerca in questa discussione..." 
          class="forum-search-bar"
        />
      </div>
    </div>

    <div class="forum-divider"></div>

    <div class="forum-main">
      <div class="posts-feed">
        <div class="user-post-card" *ngFor="let post of filteredPosts">
          
          <button class="delete-post-btn" *ngIf="isAdmin" (click)="confirmDelete(post)">✕</button>

          <div class="post-avatar-side" (click)="openProfile($event, post.user_id, post.username)">
            <img [src]="getPostAvatar(post)" alt="avatar" class="user-avatar-img" />
          </div>

          <div class="post-content-side">
            <div class="post-meta">
              <span class="post-user">@{{ post.username }}</span>
              <span class="post-date">{{ post.date | date:'dd/MM/yyyy HH:mm' }}</span>
            </div>
            <p class="post-text">{{ post.text }}</p>
          </div>

        </div> 

        <div class="empty-feed" *ngIf="posts.length === 0">
          <p>Ancora nessun post in questa categoria, scrivi tu il primo!</p>
        </div>

        <div class="empty-feed" *ngIf="posts.length > 0 && filteredPosts.length === 0">
          <p>Nessun post trovato...</p>
        </div>
      </div> 
    </div>

  </div>
</ion-content>
