<ion-fab [class.ticket]="type === 'ticket'"
         [class.forum]="type === 'forum'"
         [class.adminPanel]="type === 'adminPanel'"
         vertical="bottom"
         horizontal="end"
         slot="fixed">
  <ion-fab-button [routerLink]="route">
    <img [src]="image" [alt]="alt" class="img"/>
  </ion-fab-button>
</ion-fab>
