<ion-content class="ion-padding text-center">
  <div class="popover-content">
    <h3>Sei sicuro?</h3>
    <p>Quest'azione è <b>irreversibile</b>. Perderai tutti i tuoi dati.</p>
    
    <div class="popover-actions">
      <ion-button (click)="conferma()" expand="block" class="btn-confirm">
        Sì, elimina
      </ion-button>
      <ion-button (click)="annulla()" expand="block" fill="outline" class="btn-cancel">
        No, annulla
      </ion-button>
    </div>
  </div>
</ion-content>
